services:
  - type: web
    name: tripfamily-api
    runtime: node
    plan: free
    healthCheckPath: /api/health
    buildCommand: cd backend && TMPDIR=/var/tmp npm install && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://tripfamily.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
