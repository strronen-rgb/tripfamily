services:
  - type: web
    name: tripfamily-api
    runtime: node
    plan: free
    buildCommand: cd backend && TMPDIR=/var/tmp npm install && npx prisma generate && npx tsc || echo "BUILD FAILED with exit code $?"
    startCommand: cd backend && npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://tripfamily.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
